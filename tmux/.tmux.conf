# --- Keybindings & Settings ---
unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf

unbind '"'
unbind %
bind '"' split-window -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
bind n split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set-option -sg escape-time 10
set -g mouse on
set-option -g focus-events on
set -g base-index 1

# Terminal Overrides
set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',alacritty:RGB'
set-option -ga terminal-overrides ',alacritty:Tc'

# NOTE: you can use vars with $<var> and ${<var>} as long as the str is double quoted: ""
# WARNING: hex colors can't contain capital letters
rp_base="#232136"
rp_surface="#2a273f"
rp_overlay="#393552"
rp_muted="#6e6a86"
rp_subtle="#908caa"
rp_text="#e0def4"
rp_love="#eb6f92"
rp_gold="#f6c177"
rp_rose="#ea9a97"
rp_pine="#3e8fb0"
rp_foam="#9ccfd8"
rp_iris="#c4a7e7"
rp_leaf="#95b1ac"
rp_high="#56526e"

# --- UI Styling ---

# Status Bar
set-option -g status "on"
set-option -g status-bg "${rp_base}"
set-option -g status-justify "left"
set-option -g status-left ""
set-option -g status-right ""

# Messages (Command Line)
set-option -g message-style "fg=${rp_foam},bg=${rp_overlay},align=centre"
set-option -g message-command-style "fg=${rp_foam},bg=${rp_overlay},align=centre"

# Panes
set-option -g pane-border-style "fg=${rp_high}"
set-option -g pane-active-border-style "fg=${rp_pine}"

# Window Status (Tabs)
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "fg=${rp_subtle},bg=${rp_base}"

# Inactive Window: Subtle text on base background
set-window-option -g window-status-format "#[fg=${rp_subtle},bg=${rp_base}] #I #[fg=${rp_muted},bg=${rp_base}]"

# Active Window: Use LOVE (Pink) background for the index to match Neovim
set-window-option -g window-status-current-format "#[fg=${rp_base},bg=${rp_love},bold] #I #[fg=${rp_text},bg=${rp_overlay}]"

# --- Selection & Modes ---
set-window-option -g clock-mode-colour "${rp_pine}"

# Selection Mode (Visual selection in session list or copy mode)
# Uses LOVE background with dark text for high visibility
set-window-option -g mode-style "fg=${rp_base},bg=${rp_love},bold"

# --- Plugins ---
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'
